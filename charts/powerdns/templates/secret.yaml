{{- $items := list -}}
{{- $items = append $items (include "powerdns.secret" (dict "Root" $ "Name" "PDNS_API_KEY" "Ref" .Values.powerdns.api.key)) -}}
{{- $items = append $items (include "powerdns.secret" (dict "Root" $ "Name" "PDNS_WEBSERVER_PASSWORD" "Ref" .Values.powerdns.webserver.password)) -}}
{{- if ne .Values.powerdns.db.driver "gsqlite3" -}}
{{- $items = append $items (include "powerdns.secret" (dict "Root" $ "Name" "PDNS_DB_HOST" "Ref" .Values.powerdns.db.host)) -}}
{{- $items = append $items (include "powerdns.secret" (dict "Root" $ "Name" "PDNS_DB_PORT" "Ref" .Values.powerdns.db.port)) -}}
{{- $items = append $items (include "powerdns.secret" (dict "Root" $ "Name" "PDNS_DB_NAME" "Ref" .Values.powerdns.db.name)) -}}
{{- $items = append $items (include "powerdns.secret" (dict "Root" $ "Name" "PDNS_DB_USERNAME" "Ref" .Values.powerdns.db.username)) -}}
{{- $items = append $items (include "powerdns.secret" (dict "Root" $ "Name" "PDNS_DB_PASSWORD" "Ref" .Values.powerdns.db.password)) -}}
{{- end -}}
{{- $data := join "\n" (compact $items) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "powerdns.fullname" . }}
  labels:
    {{- include "powerdns.selectorLabels" . | nindent 4 }}
type: Opaque
{{- if $data }}
data:
{{ $data | nindent 2 }}
{{- else }}
data: {}
{{- end }}
